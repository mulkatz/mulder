name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - run: npm ci
        working-directory: demo

      - name: Lint
        run: npm run lint
        working-directory: demo

      - name: Build
        run: npm run build
        working-directory: demo
