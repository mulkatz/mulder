      - name: Upload heavy test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-test-results-${{ matrix.shard_index }}
          path: .test-results
          if-no-files-found: ignore

  full-external-tests:
    if: github.event_name == 'workflow_dispatch'
    name: external tests (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Setup test config
        run: cp mulder.config.example.yaml mulder.config.yaml

      - name: Prepare test results
        run: mkdir -p .test-results

      - name: Show lane plan
        run: node scripts/test-lanes.mjs summary external | tee .test-results/external-plan.txt

      - name: Run external lane
        run: pnpm test:lane -- external -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/external-junit.xml
        env:
          NODE_ENV: test

      - name: Upload external test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-test-results
          path: .test-results
          if-no-files-found: ignore

  app:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm --filter @mulder/app build
