        run: pnpm test:lane -- external -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/external-junit.xml
        env:
          NODE_ENV: test

      - name: Upload external test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-test-results
          path: .test-results
          if-no-files-found: ignore

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm --filter @mulder/app build
