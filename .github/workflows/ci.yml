name: CI

on:
  push:
    branches: [main, "milestone/**"]
  pull_request:
    branches: [main, "milestone/**"]
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

  health:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mulder
          POSTGRES_PASSWORD: mulder
          POSTGRES_DB: mulder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mulder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install PostGIS into PostgreSQL container
        run: |
          PG_CONTAINER=$(docker ps -q --filter "ancestor=pgvector/pgvector:pg17")
          docker exec "$PG_CONTAINER" bash -c "apt-get update && apt-get install -y --no-install-recommends postgresql-17-postgis-3 postgresql-17-postgis-3-scripts && rm -rf /var/lib/apt/lists/*"

      - name: Install PostgreSQL extensions
        run: |
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Setup test config
        run: cp mulder.config.example.yaml mulder.config.yaml

      - name: Prepare test results
        run: mkdir -p .test-results

      - name: Run E2E health check (Spec 44)
        run: pnpm test:health -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/health-junit.xml
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: mulder
          PGPASSWORD: mulder
          PGDATABASE: mulder

      - name: Upload health test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-test-results
          path: .test-results
          if-no-files-found: ignore

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Prepare test results
        run: mkdir -p .test-results

      - name: Show lane plan
        run: node scripts/test-lanes.mjs summary unit | tee .test-results/unit-plan.txt

      - name: Run unit lane
        run: pnpm test:lane -- unit -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/unit-junit.xml
        env:
          NODE_ENV: test

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: .test-results
          if-no-files-found: ignore

  pr-affected-tests:
    if: github.event_name == 'pull_request'
    name: affected tests
    runs-on: ubuntu-latest
    needs: [build, health]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mulder
          POSTGRES_PASSWORD: mulder
          POSTGRES_DB: mulder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mulder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install PostGIS into PostgreSQL container
        run: |
          PG_CONTAINER=$(docker ps -q --filter "ancestor=pgvector/pgvector:pg17")
          docker exec "$PG_CONTAINER" bash -c "apt-get update && apt-get install -y --no-install-recommends postgresql-17-postgis-3 postgresql-17-postgis-3-scripts && rm -rf /var/lib/apt/lists/*"

      - name: Install PostgreSQL extensions
        run: |
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Setup test config
        run: cp mulder.config.example.yaml mulder.config.yaml

      - name: Prepare test results
        run: mkdir -p .test-results

      - name: Run affected tests
        run: pnpm test:affected -- origin/${{ github.base_ref }} -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/affected-junit.xml
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: mulder
          PGPASSWORD: mulder
          PGDATABASE: mulder
          MULDER_TEST_ISOLATED_DB: "true"
          MULDER_TEST_SKIP_HEALTH_SPEC_IN_AFFECTED: "true"

      - name: Upload affected test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: affected-test-results
          path: .test-results
          if-no-files-found: ignore

  full-schema-tests:
    if: github.event_name != 'pull_request'
    name: schema tests
