          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Setup test config
        run: cp mulder.config.example.yaml mulder.config.yaml

      - name: Prepare test results
        run: mkdir -p .test-results

      - name: Show lane plan
        run: node scripts/test-lanes.mjs summary db ${{ matrix.shard_index }} ${{ matrix.shard_total }} | tee .test-results/db-${{ matrix.shard_index }}-plan.txt

      - name: Run tests
        run: pnpm test:lane -- db ${{ matrix.shard_index }} ${{ matrix.shard_total }} -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/db-${{ matrix.shard_index }}-junit.xml
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: mulder
          PGPASSWORD: mulder
          PGDATABASE: mulder
          MULDER_TEST_ISOLATED_DB: "true"

      - name: Upload DB test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-test-results-${{ matrix.shard_index }}
          path: .test-results
          if-no-files-found: ignore

  full-heavy-tests:
    if: github.event_name != 'pull_request'
    name: heavy tests (${{ matrix.shard_index }}/${{ matrix.shard_total }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]
        shard_total: [3]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mulder
          POSTGRES_PASSWORD: mulder
          POSTGRES_DB: mulder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mulder"
