      - name: Install PostgreSQL extensions
        run: |
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          PGPASSWORD=mulder psql -h localhost -U mulder -d mulder -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Setup test config
        run: cp mulder.config.example.yaml mulder.config.yaml

      - name: Prepare test results
        run: mkdir -p .test-results

      - name: Show lane plan
        run: node scripts/test-lanes.mjs summary schema | tee .test-results/schema-plan.txt

      - name: Run schema lane
        run: pnpm test:lane -- schema -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/schema-junit.xml
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: mulder
          PGPASSWORD: mulder
          PGDATABASE: mulder
          MULDER_TEST_ISOLATED_DB: "true"

      - name: Upload schema test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-test-results
          path: .test-results
          if-no-files-found: ignore

  full-db-tests:
    if: github.event_name != 'pull_request'
    name: db tests (${{ matrix.shard_index }}/${{ matrix.shard_total }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2]
        shard_total: [2]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mulder
          POSTGRES_PASSWORD: mulder
          POSTGRES_DB: mulder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mulder"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
