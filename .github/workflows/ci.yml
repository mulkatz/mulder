      - name: Show lane plan
        run: node scripts/test-lanes.mjs summary heavy ${{ matrix.shard_index }} ${{ matrix.shard_total }} | tee .test-results/heavy-${{ matrix.shard_index }}-plan.txt

      - name: Run tests
        run: pnpm test:lane -- heavy ${{ matrix.shard_index }} ${{ matrix.shard_total }} -- --reporter=verbose --reporter=junit --outputFile.junit=.test-results/heavy-${{ matrix.shard_index }}-junit.xml
        env:
